(function(){
  var list = document.querySelector('.card-archive-list');
  if (list) {
    var items = [].slice.call(list.querySelectorAll('.card-archive-list-item'));
    if (items.length) {
      var groups = {};
      items.forEach(function(item){
        var a = item.querySelector('a');
        if (!a) return;
        var m = a.getAttribute('href').match(/\/archives\/(\d{4})\//);
        if (!m) return;
        var y = m[1];
        if (!groups[y]) groups[y] = [];
        groups[y].push(item.cloneNode(true));
      });
      list.innerHTML = '';
      var years = Object.keys(groups).sort(function(a,b){ return b-a; });
      var nowYear = String(new Date().getFullYear());
      years.forEach(function(year){
        var li = document.createElement('li');
        li.className = 'card-archive-list-item card-archive-year';
        li.innerHTML = '<span class="year-toggle">▼</span><span class="year-text">' + year + ' 年</span><span class="year-count">' + groups[year].length + ' 篇</span>';
        var ul = document.createElement('ul');
        ul.className = 'card-archive-month-list';
        var expanded = (year === nowYear);
        if (!expanded) ul.style.display = 'none';
        li.querySelector('.year-toggle').textContent = expanded ? '▼' : '▶';
        groups[year].forEach(function(m){ ul.appendChild(m); });
        li.addEventListener('click', function(){
          var u = this.nextElementSibling;
          var t = this.querySelector('.year-toggle');
          if (u.style.display === 'none'){ u.style.display = 'block'; t.textContent = '▼'; }
          else { u.style.display = 'none'; t.textContent = '▶'; }
        });
        list.appendChild(li); list.appendChild(ul);
      });
    }
  }
})();
</script>
